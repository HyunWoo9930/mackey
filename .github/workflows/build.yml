name: build

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test

  build-exe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu
      - name: Install mingw-w64
        run: sudo apt-get update && sudo apt-get install -y gcc-mingw-w64-x86-64
      - run: cargo build --release --target x86_64-pc-windows-gnu
      - uses: actions/upload-artifact@v4
        with:
          name: mackey-exe
          path: target/x86_64-pc-windows-gnu/release/mackey.exe

  installer:
    needs: build-exe
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: mackey-exe
          path: bin
      - name: Build installer
        shell: pwsh
        run: |
          iscc /DExePath=..\bin\mackey.exe installer\mackey.iss
      - uses: actions/upload-artifact@v4
        with:
          name: MacKeySetup
          path: installer/output/MacKeySetup.exe

  # tag push (v*) → publish installer + exe on the Releases page
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: installer
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: MacKeySetup
      - uses: actions/download-artifact@v4
        with:
          name: mackey-exe
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            MacKeySetup.exe
            mackey.exe
