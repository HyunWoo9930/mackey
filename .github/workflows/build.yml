name: build

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test

  build-exe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu
      - name: Install mingw-w64
        run: sudo apt-get update && sudo apt-get install -y gcc-mingw-w64-x86-64
      - run: cargo build --release --target x86_64-pc-windows-gnu
      - uses: actions/upload-artifact@v4
        with:
          name: mackey-exe
          path: target/x86_64-pc-windows-gnu/release/mackey.exe

  # run the real exe on a real Windows machine: hook install, autostart
  # registration, and live Alt=Cmd remapping through a focused textbox
  e2e-windows:
    needs: build-exe
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: mackey-exe
          path: bin
      - name: End-to-end remap test
        shell: powershell
        run: powershell -ExecutionPolicy Bypass -File ci\e2e.ps1 bin\mackey.exe

  installer:
    needs: build-exe
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: mackey-exe
          path: bin
      - name: Build installer
        shell: pwsh
        run: |
          iscc /DExePath=..\bin\mackey.exe installer\mackey.iss
      - name: Install / uninstall cycle on real Windows
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Start-Process -Wait installer\output\MacKeySetup.exe -ArgumentList "/VERYSILENT","/SUPPRESSMSGBOXES","/NORESTART"
          $exe = "C:\Program Files\MacKey\mackey.exe"
          if (!(Test-Path $exe)) { throw "FAIL: exe not installed" }
          schtasks /Query /TN MacKey; if ($LASTEXITCODE -ne 0) { throw "FAIL: autostart task missing after install" }
          Start-Sleep -Seconds 4
          if (!(Get-Process mackey -ErrorAction SilentlyContinue)) { throw "FAIL: app not running after install" }
          Write-Host "PASS: silent install -> files + autostart task + app resident"
          Start-Process -Wait "C:\Program Files\MacKey\unins000.exe" -ArgumentList "/VERYSILENT","/SUPPRESSMSGBOXES"
          Start-Sleep -Seconds 2
          schtasks /Query /TN MacKey 2>$null; if ($LASTEXITCODE -eq 0) { throw "FAIL: task still present after uninstall" }
          if (Get-Process mackey -ErrorAction SilentlyContinue) { throw "FAIL: app still running after uninstall" }
          Write-Host "PASS: silent uninstall -> task removed + app stopped"
      - uses: actions/upload-artifact@v4
        with:
          name: MacKeySetup
          path: installer/output/MacKeySetup.exe

  # tag push (v*) → publish installer + exe on the Releases page
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: installer
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: MacKeySetup
      - uses: actions/download-artifact@v4
        with:
          name: mackey-exe
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            MacKeySetup.exe
            mackey.exe
